<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9" opacity="0.8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" opacity="0.8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a" opacity="0.8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706" opacity="0.8"/>
    </marker>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#f0f6fc" text-anchor="middle">Human Agent — Architecture</text>
  <text x="450" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Autonomous Visual Project Supervisor · Full Loop</text>
  <line x1="60" y1="68" x2="840" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- ═══ ROW 1: User Input ═══ -->
  <!-- User Requirements box -->
  <rect x="310" y="82" width="280" height="52" rx="10" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="310" y="82" width="280" height="4" rx="2" fill="url(#blueGrad)"/>
  <text x="450" y="107" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">📋 User Requirements</text>
  <text x="450" y="123" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">PRD.md · docs/PROJECT_REQUIREMENTS.md</text>

  <!-- Arrow down -->
  <line x1="450" y1="134" x2="450" y2="156" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowBlue)"/>

  <!-- ═══ ROW 2: Requirement Planner ═══ -->
  <rect x="310" y="158" width="280" height="52" rx="10" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="310" y="158" width="280" height="4" rx="2" fill="url(#blueGrad)"/>
  <text x="450" y="183" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">🧠 Requirement Planner</text>
  <text x="450" y="199" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">requirement_planner_agent.py</text>

  <!-- Arrow down -->
  <line x1="450" y1="210" x2="450" y2="232" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowPurple)"/>

  <!-- ═══ ROW 3: Decision Engine (central) ═══ -->
  <rect x="280" y="234" width="340" height="56" rx="10" fill="#1a0f2e" stroke="#7c3aed" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="280" y="234" width="340" height="4" rx="2" fill="url(#purpleGrad)"/>
  <text x="450" y="261" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">⚡ Supervisor Decision Engine</text>
  <text x="450" y="279" font-family="monospace" font-size="10" fill="#7c3aed" text-anchor="middle">supervisor_decision_engine.py</text>

  <!-- Arrows out left and right from Decision Engine -->
  <!-- Left: to Prompt Generator -->
  <line x1="280" y1="262" x2="210" y2="262" stroke="#7c3aed" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <!-- Right: to Screen Vision -->
  <line x1="620" y1="262" x2="690" y2="262" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Arrow down -->
  <line x1="450" y1="290" x2="450" y2="312" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowPurple)"/>

  <!-- ═══ LEFT COLUMN ═══ -->
  <!-- Prompt Generator -->
  <rect x="50" y="234" width="190" height="56" rx="10" fill="#161b22" stroke="#7c3aed" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="50" y="234" width="190" height="4" rx="2" fill="url(#purpleGrad)"/>
  <text x="145" y="259" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f0f6fc" text-anchor="middle">✏️ Prompt Generator</text>
  <text x="145" y="276" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">supervisor_prompt_generator.py</text>

  <!-- Arrow from Prompt Generator down to Coding Agent -->
  <line x1="145" y1="290" x2="145" y2="352" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowPurple)"/>

  <!-- Coding Agent box -->
  <rect x="50" y="354" width="190" height="56" rx="10" fill="#161b22" stroke="#a78bfa" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="50" y="354" width="190" height="4" rx="2" fill="url(#purpleGrad)"/>
  <text x="145" y="379" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f0f6fc" text-anchor="middle">🤖 Coding Agent</text>
  <text x="145" y="396" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">Cursor · VS Code · Claude Code</text>

  <!-- Arrow from Coding Agent back up (feedback loop) -->
  <path d="M 50 382 Q 20 382 20 262 Q 20 200 50 258" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.4" marker-end="url(#arrowPurple)"/>

  <!-- ═══ RIGHT COLUMN ═══ -->
  <!-- Screen Vision -->
  <rect x="660" y="234" width="190" height="56" rx="10" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="660" y="234" width="190" height="4" rx="2" fill="url(#blueGrad)"/>
  <text x="755" y="259" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f0f6fc" text-anchor="middle">👁️ Screen Vision</text>
  <text x="755" y="276" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">screen_capture + vision_analyzer</text>

  <!-- Arrow from Screen Vision down to Permission Handler -->
  <line x1="755" y1="290" x2="755" y2="352" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Permission Handler -->
  <rect x="660" y="354" width="190" height="56" rx="10" fill="#161b22" stroke="#0ea5e9" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="660" y="354" width="190" height="4" rx="2" fill="url(#blueGrad)"/>
  <text x="755" y="379" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f0f6fc" text-anchor="middle">🔐 Permission Handler</text>
  <text x="755" y="396" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">permission_handler_agent.py</text>

  <!-- ═══ ROW 4: Build Validator ═══ -->
  <rect x="310" y="314" width="280" height="52" rx="10" fill="#161b22" stroke="#16a34a" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="310" y="314" width="280" height="4" rx="2" fill="url(#greenGrad)"/>
  <text x="450" y="339" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">🔨 Build Validator</text>
  <text x="450" y="355" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">install · build · test · dev-server</text>

  <!-- Arrow down -->
  <line x1="450" y1="366" x2="450" y2="388" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowGreen)"/>

  <!-- ═══ ROW 5: Browser QA ═══ -->
  <rect x="310" y="390" width="280" height="52" rx="10" fill="#161b22" stroke="#16a34a" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="310" y="390" width="280" height="4" rx="2" fill="url(#greenGrad)"/>
  <text x="450" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">🌐 Browser QA Tester</text>
  <text x="450" y="431" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Playwright · API · UI flows · console errors</text>

  <!-- Arrow down -->
  <line x1="450" y1="442" x2="450" y2="464" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowOrange)"/>

  <!-- ═══ ROW 6: Bug Reporter ═══ -->
  <rect x="310" y="466" width="280" height="52" rx="10" fill="#161b22" stroke="#d97706" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="310" y="466" width="280" height="4" rx="2" fill="url(#orangeGrad)"/>
  <text x="450" y="491" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#f0f6fc" text-anchor="middle">🐛 Bug Reporter</text>
  <text x="450" y="507" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">screenshot · stack trace · fix prompt</text>

  <!-- Feedback arrow: Bug Reporter back to Decision Engine (loop) -->
  <path d="M 590 492 Q 870 492 870 262 Q 870 234 620 262" stroke="#d97706" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.5" marker-end="url(#arrowOrange)"/>
  <text x="876" y="370" font-family="monospace" font-size="9" fill="#d97706" opacity="0.7" transform="rotate(90,876,370)">fix loop</text>

  <!-- Arrow down from Bug Reporter -->
  <line x1="450" y1="518" x2="450" y2="540" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" marker-end="url(#arrowGreen)"/>

  <!-- ═══ ROW 7: Final Report ═══ -->
  <rect x="310" y="542" width="280" height="52" rx="10" fill="#0d2818" stroke="#22c55e" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="310" y="542" width="280" height="4" rx="2" fill="url(#greenGrad)"/>
  <text x="450" y="567" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">✅ Final Report</text>
  <text x="450" y="583" font-family="monospace" font-size="10" fill="#16a34a" text-anchor="middle">readiness score · coverage · all checks passed</text>

  <!-- Left side connector lines to centre column -->
  <line x1="240" y1="382" x2="310" y2="382" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="240" y1="342" x2="310" y2="342" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Right side connector lines to centre column -->
  <line x1="660" y1="382" x2="590" y2="382" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="660" y1="342" x2="590" y2="342" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Legend -->
  <rect x="60" y="540" width="200" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="557" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#8b949e" text-anchor="middle">LEGEND</text>
  <line x1="75" y1="567" x2="95" y2="567" stroke="#0ea5e9" stroke-width="2"/>
  <text x="100" y="571" font-family="monospace" font-size="9" fill="#8b949e">Vision / Monitor</text>
  <line x1="75" y1="581" x2="95" y2="581" stroke="#7c3aed" stroke-width="2"/>
  <text x="100" y="585" font-family="monospace" font-size="9" fill="#8b949e">Decision / Control</text>
  <line x1="75" y1="595" x2="95" y2="595" stroke="#16a34a" stroke-width="2"/>
  <text x="100" y="599" font-family="monospace" font-size="9" fill="#8b949e">Validate / Report</text>

  <!-- Repository name watermark -->
  <text x="840" y="610" font-family="monospace" font-size="9" fill="#30363d" text-anchor="end">github.com/rajakumar865465/human-agent</text>
</svg>
