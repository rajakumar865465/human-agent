<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="#7c3aed" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="1080" cy="200" rx="300" ry="200" fill="#00d4ff" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="640" cy="350" rx="400" ry="150" fill="#7c3aed" opacity="0.06" filter="url(#blur1)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="100" x2="1280" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="200" x2="1280" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="300" x2="1280" y2="300" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="160" y1="0" x2="160" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="1120" y1="0" x2="1120" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Left panel — screen monitor icon -->
  <rect x="80" y="110" width="220" height="150" rx="12" fill="#161b22" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="92" y="122" width="196" height="118" rx="6" fill="#0d1117"/>
  <!-- Screen content lines -->
  <rect x="104" y="134" width="80" height="6" rx="3" fill="#00d4ff" opacity="0.6"/>
  <rect x="104" y="148" width="120" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
  <rect x="104" y="158" width="100" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
  <rect x="104" y="168" width="140" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <rect x="104" y="178" width="90" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
  <rect x="104" y="188" width="110" height="4" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="104" y="198" width="80" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
  <rect x="104" y="208" width="130" height="4" rx="2" fill="#ffffff" opacity="0.1"/>
  <!-- Monitor stand -->
  <rect x="175" y="260" width="10" height="20" rx="2" fill="#30363d"/>
  <rect x="155" y="278" width="50" height="6" rx="3" fill="#30363d"/>
  <!-- Label -->
  <text x="190" y="305" font-family="monospace" font-size="11" fill="#00d4ff" opacity="0.8" text-anchor="middle">SCREEN VISION</text>

  <!-- Arrow 1 -->
  <line x1="310" y1="185" x2="390" y2="185" stroke="url(#lineGrad)" stroke-width="2" opacity="0.6"/>
  <polygon points="390,180 400,185 390,190" fill="#00d4ff" opacity="0.6"/>

  <!-- Center box — brain/AI -->
  <rect x="400" y="100" width="480" height="200" rx="16" fill="url(#glow1)" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- Neural net dots -->
  <circle cx="460" cy="150" r="5" fill="#7c3aed" opacity="0.8" filter="url(#glow)"/>
  <circle cx="460" cy="200" r="5" fill="#7c3aed" opacity="0.8" filter="url(#glow)"/>
  <circle cx="530" cy="170" r="6" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
  <circle cx="530" cy="230" r="5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="600" cy="150" r="7" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="600" cy="200" r="6" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="600" cy="250" r="5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="670" cy="170" r="6" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
  <circle cx="670" cy="220" r="5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="740" cy="150" r="5" fill="#7c3aed" opacity="0.8" filter="url(#glow)"/>
  <circle cx="740" cy="200" r="5" fill="#7c3aed" opacity="0.8" filter="url(#glow)"/>
  <!-- Neural net lines -->
  <line x1="460" y1="150" x2="530" y2="170" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="460" y1="200" x2="530" y2="170" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="460" y1="150" x2="530" y2="230" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="460" y1="200" x2="530" y2="230" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="530" y1="170" x2="600" y2="150" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="530" y1="170" x2="600" y2="200" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="530" y1="230" x2="600" y2="200" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="530" y1="230" x2="600" y2="250" stroke="#a78bfa" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="600" y1="150" x2="670" y2="170" stroke="#00d4ff" stroke-opacity="0.4" stroke-width="1.5"/>
  <line x1="600" y1="200" x2="670" y2="170" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="600" y1="200" x2="670" y2="220" stroke="#00d4ff" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="600" y1="250" x2="670" y2="220" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="670" y1="170" x2="740" y2="150" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="670" y1="170" x2="740" y2="200" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="670" y1="220" x2="740" y2="200" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Right panel — terminal/coding agent -->
  <rect x="980" y="110" width="220" height="150" rx="12" fill="#161b22" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="980" y="110" width="220" height="28" rx="12" fill="#1f2937"/>
  <rect x="980" y="124" width="220" height="14" fill="#1f2937"/>
  <circle cx="997" cy="124" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="1013" cy="124" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="1029" cy="124" r="5" fill="#22c55e" opacity="0.8"/>
  <!-- Terminal text -->
  <text x="996" y="158" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.9">$ python main.py visual-supervisor</text>
  <text x="996" y="172" font-family="monospace" font-size="9" fill="#00d4ff" opacity="0.8">✓ Screen captured</text>
  <text x="996" y="186" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.8">→ Analyzing activity...</text>
  <text x="996" y="200" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.8">✓ Build passed</text>
  <text x="996" y="214" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.8">⚡ Running QA tests</text>
  <text x="996" y="228" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.8">✓ All checks passed</text>
  <!-- Label -->
  <text x="1090" y="305" font-family="monospace" font-size="11" fill="#7c3aed" opacity="0.8" text-anchor="middle">CODING AGENT</text>

  <!-- Arrow 2 -->
  <line x1="880" y1="185" x2="970" y2="185" stroke="url(#lineGrad)" stroke-width="2" opacity="0.6"/>
  <polygon points="970,180 980,185 970,190" fill="#7c3aed" opacity="0.6"/>

  <!-- Divider line -->
  <line x1="100" y1="340" x2="1180" y2="340" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="640" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="1">human-agent</text>

  <!-- Subtitle -->
  <text x="640" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">Autonomous Visual Project Supervisor · Watch · Decide · Ship</text>

  <!-- Bottom tags -->
  <rect x="390" y="355" width="90" height="24" rx="12" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="435" y="371" font-family="monospace" font-size="11" fill="#00d4ff" text-anchor="middle">Python 3.11+</text>

  <rect x="492" y="355" width="80" height="24" rx="12" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="532" y="371" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">Vision AI</text>

  <rect x="584" y="355" width="80" height="24" rx="12" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="624" y="371" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">Playwright</text>

  <rect x="676" y="355" width="80" height="24" rx="12" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="716" y="371" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">FastAPI</text>

  <rect x="768" y="355" width="120" height="24" rx="12" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="828" y="371" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle">Open Source ♥</text>
</svg>
