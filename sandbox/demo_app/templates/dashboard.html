<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - TaskFlow Lite</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #ecfeff; color: #0f172a; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    .card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 12px 30px rgba(15,23,42,.08); }
    .buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    button { border: 0; border-radius: 999px; padding: 14px 20px; background: #0f766e; color: white; cursor: pointer; }
    button.secondary { background: #111827; }
    button.ghost { background: #e2e8f0; color: #0f172a; }
    #status { margin-top: 20px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Dashboard</h1>
      <p>Welcome, {{username}}</p>
      <div class="buttons">
        <button onclick="document.getElementById('status').innerText='Success'">Main action</button>
        <button class="secondary" onclick="window.location='/settings'">Settings</button>
        <button class="ghost" onclick="window.location='/'">Home</button>
      </div>
      <div id="status">{{status}}</div>
    </div>
  </div>
</body>
</html>
