<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow Lite</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fb; color: #1f2937; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    .hero { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 12px 30px rgba(15,23,42,.08); }
    .buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    button { border: 0; border-radius: 999px; padding: 14px 20px; background: #111827; color: white; cursor: pointer; }
    button.secondary { background: #2563eb; }
    button.ghost { background: #e5e7eb; color: #111827; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>TaskFlow Lite</h1>
      <p>A tiny demo app for testing the supervisor loop.</p>
      <div class="buttons">
        <button onclick="window.location='/login'">Login</button>
        <button class="secondary" onclick="window.location='/dashboard'">Dashboard</button>
        <button class="ghost" onclick="window.location='/health'">Health API</button>
      </div>
    </div>
  </div>
</body>
</html>
